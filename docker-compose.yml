services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # API yalnızca Docker ağı üzerinden (nginx proxy) erişilebilir; dış port kapalı
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - app_data:/data
      - app_logs:/logs
    depends_on:
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app_data:/data
      - app_logs:/logs
    depends_on:
      - redis
      - api
    command: /opt/venv/bin/python -m app.worker.consumer

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  redis_data:
  app_data:
  app_logs:
